# --- Paths ---
data_path: "data/STR_data/HipSTR_labeled_STRs/str_len_2_n_flanking_10000.tsv"
ref_path: "data/STR_data/reference_genome/GRCh38_full_analysis_set_plus_decoy_hla.fa"
experiment_name: "caduceus_v0/str2/str2_f5000_var"

# --- Data ---
batch_size: 16
accumulate_grad_batches: 16
dataloader_num_workers: 4
n_flanking_bp: 5000
n_str_bp: 8

# Single objective (variation only). With one target, loss_weighting defaults to "sum".
targets:
  variation: heterozygosity

# --- Model ---
n_prefix_prompt_tokens: 16
n_str_prompt_tokens: 16
n_suffix_prompt_tokens: 16

head_hidden_layers: [256, 128]
head_dropout: 0.1

use_attention_pooling: True
attention_pooling_num_heads: 4

# --- Optimizer (two LRs: backbone low, new heads/tokens higher) ---
optimizer_name: "AdamW"
lr: 1e-4
backbone_lr: 1e-5
weight_decay: 0.01

# --- Scheduler ---
scheduler_name: "ReduceLROnPlateau"
scheduler_patience: 5
scheduler_factor: 0.5

# --- Trainer ---
max_epochs: 500
patience_early_stopping: 20
gradient_clip_val: 1.0
precision: "bf16-mixed"
