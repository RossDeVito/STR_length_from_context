# Dev config for Caduceus-Ph full fine-tuning (small/fast; for a GPU smoke run).
# Run: python -m seq_models.caduceus.fine_tune \
#        --config scripts/training/training_configs/caduceus/dev.yaml \
#        --output_dir scripts/training/output/caduceus

# --- Paths ---
data_path: "data/STR_data/HipSTR_labeled_STRs/str_len_2_n_flanking_10000.tsv"
ref_path: "data/STR_data/reference_genome/GRCh38_full_analysis_set_plus_decoy_hla.fa"
experiment_name: "caduceus/dev"

# --- Data ---
batch_size: 16
accumulate_grad_batches: 4
dataloader_num_workers: 4
n_flanking_bp: 1000
n_str_bp: 8
dev_subset_n: 250          # cap every split for a fast dev cycle

# Multi-objective targets (output_name -> data column). Defaults shown; drop one
# to train a single objective.
targets:
  length: mode_copy_number
  variation: heterozygosity

# --- Model ---
n_prefix_prompt_tokens: 16
n_str_prompt_tokens: 16
n_suffix_prompt_tokens: 16

head_hidden_layers: [256, 128]
head_dropout: 0.1

use_attention_pooling: True
attention_pooling_num_heads: 4

# --- Optimizer (two LRs: backbone low, new heads/tokens higher) ---
optimizer_name: "AdamW"
lr: 1e-4
backbone_lr: 1e-5
weight_decay: 0.01

# --- Scheduler ---
scheduler_name: "ReduceLROnPlateau"
scheduler_patience: 3
scheduler_factor: 0.5

# --- Trainer ---
max_epochs: 5
patience_early_stopping: 5
gradient_clip_val: 1.0
precision: "bf16-mixed"
