# --- Model (dir relative to scripts/training/output/caduceus/) ---
model_dir: "caduceus_v0/str2/str2_f5000_fiv_v3_2026-06-23_01-25-37"
desc: "caduceus_v0/str2/str2_f5000_fiv_v3"

# --- RPI ---
split: "test"
